openapi: '3.0.0'
info:
  title: Polymorphic Test API
  version: '1.0'
paths:
  /shapes:
    get:
      operationId: listShapes
      summary: List shapes
      tags:
        - shapes
      responses:
        '200':
          description: A list of shapes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Shape'
components:
  schemas:
    Shape:
      oneOf:
        - $ref: '#/components/schemas/Circle'
        - $ref: '#/components/schemas/Square'
      discriminator:
        propertyName: shapeType
        mapping:
          circle: '#/components/schemas/Circle'
          square: '#/components/schemas/Square'
    Circle:
      type: object
      required:
        - radius
        - shapeType
      properties:
        radius:
          type: number
        shapeType:
          type: string
    Square:
      type: object
      required:
        - sideLength
        - shapeType
      properties:
        sideLength:
          type: number
        shapeType:
          type: string
    Pet:
      oneOf:
        - $ref: '#/components/schemas/Cat'
        - $ref: '#/components/schemas/Dog'
    Cat:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        indoor:
          type: boolean
    Dog:
      type: object
      required:
        - name
        - breed
      properties:
        name:
          type: string
        breed:
          type: string
    ExtendedDog:
      allOf:
        - $ref: '#/components/schemas/Dog'
        - type: object
          required:
            - tricks
          properties:
            tricks:
              type: array
              items:
                type: string
