openapi: "3.0.3"
info:
  title: Refs Test Spec
  version: "1.0.0"
  description: Spec exercising various $ref resolution patterns

paths:
  /orders:
    get:
      operationId: listOrders
      summary: List orders
      parameters:
        - $ref: '#/components/parameters/LimitParam'
      responses:
        "200":
          description: A list of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

  /orders/{orderId}:
    get:
      operationId: getOrder
      summary: Get an order by ID
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: A single order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

components:
  parameters:
    LimitParam:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return
      schema:
        type: integer
        format: int32

  schemas:
    Order:
      type: object
      required:
        - id
        - item
      properties:
        id:
          type: integer
          format: int64
        item:
          $ref: '#/components/schemas/Item'
        customer:
          $ref: '#/components/schemas/Customer'

    Item:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        details:
          $ref: '#/components/schemas/ItemDetails'

    ItemDetails:
      type: object
      properties:
        description:
          type: string
        weight:
          type: number
          format: double

    Customer:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        email:
          type: string
