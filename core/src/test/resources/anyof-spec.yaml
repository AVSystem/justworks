openapi: '3.0.0'
info:
  title: AnyOf Test API
  version: '1.0'
paths:
  /payments:
    get:
      operationId: listPayments
      summary: List payments
      tags:
        - payments
      responses:
        '200':
          description: A list of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'
components:
  schemas:
    Payment:
      anyOf:
        - $ref: '#/components/schemas/CreditCard'
        - $ref: '#/components/schemas/BankTransfer'
      discriminator:
        propertyName: paymentType
        mapping:
          card: '#/components/schemas/CreditCard'
          bank: '#/components/schemas/BankTransfer'
    CreditCard:
      type: object
      required:
        - cardNumber
        - paymentType
      properties:
        cardNumber:
          type: string
        paymentType:
          type: string
    BankTransfer:
      type: object
      required:
        - accountNumber
        - paymentType
      properties:
        accountNumber:
          type: string
        paymentType:
          type: string
    UnionPayment:
      anyOf:
        - $ref: '#/components/schemas/CreditCard'
        - $ref: '#/components/schemas/BankTransfer'
